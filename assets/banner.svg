<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#feca57"/>
      <stop offset="100%" style="stop-color:#48dbfb"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="400" fill="url(#bg3)"/>
  
  <g opacity="0.4">
    <circle cx="1000" cy="200" r="120" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="10 5"/>
    <circle cx="1000" cy="200" r="80" fill="none" stroke="#feca57" stroke-width="2" stroke-dasharray="8 4"/>
    <circle cx="1000" cy="200" r="40" fill="none" stroke="#48dbfb" stroke-width="2"/>
  </g>
  
  <g transform="translate(1000, 200)" opacity="0.6">
    <circle r="10" fill="#ff6b6b"/>
    <g transform="rotate(45)">
      <rect x="30" y="-3" width="50" height="6" fill="#feca57" rx="3"/>
    </g>
    <g transform="rotate(-30)">
      <rect x="60" y="-3" width="30" height="6" fill="#48dbfb" rx="3"/>
    </g>
  </g>
  
  <g opacity="0.2" fill="#ff6b6b">
    <circle cx="150" cy="80" r="3"/>
    <circle cx="200" cy="120" r="2"/>
    <circle cx="120" cy="150" r="4"/>
    <circle cx="250" cy="60" r="2"/>
    <circle cx="180" cy="50" r="3"/>
  </g>
  
  <g opacity="0.2" fill="#48dbfb">
    <circle cx="700" cy="60" r="3"/>
    <circle cx="750" cy="100" r="2"/>
    <circle cx="680" cy="130" r="4"/>
  </g>
  
  <text x="60" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#glow3)">
    🚗 智驾时代
  </text>
  <text x="60" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="500">
    <tspan fill="#ff6b6b">Agent</tspan>
    <tspan fill="#ffffff"> 进化简史</tspan>
  </text>
  <text x="60" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" fill="#b0a0d0">
    从Prompt到自进化的AI驾驶之路
  </text>
  
  <line x1="60" y1="290" x2="300" y2="290" stroke="url(#accent3)" stroke-width="3" stroke-linecap="round"/>
  
  <text x="60" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#7a6a9a">
    用自动驾驶的隐喻 · 娓娓道来
  </text>
  <text x="60" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#7a6a9a">
    Prompt工程 → Loop自进化 的完整历程
  </text>
  
  <text x="1140" y="380" font-family="monospace" font-size="14" fill="#4a3a6a" text-anchor="end">
    agent-evolution-book
  </text>
</svg>
