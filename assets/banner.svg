<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="50%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7043;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffa726;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <g transform="translate(920, 100)" opacity="0.2">
    <circle cx="80" cy="100" r="100" fill="none" stroke="#ff7043" stroke-width="2" stroke-dasharray="12 6"/>
    <circle cx="80" cy="100" r="65" fill="none" stroke="#ffa726" stroke-width="2" stroke-dasharray="10 5"/>
    <circle cx="80" cy="100" r="35" fill="none" stroke="#66bb6a" stroke-width="2"/>
    <circle cx="80" cy="100" r="10" fill="#ffa726"/>
    <line x1="80" y1="0" x2="80" y2="-15" stroke="#ff7043" stroke-width="2"/>
    <line x1="80" y1="200" x2="80" y2="215" stroke="#66bb6a" stroke-width="2"/>
    <circle cx="80" cy="-15" r="5" fill="#ff7043"/>
    <circle cx="80" cy="215" r="5" fill="#66bb6a"/>
  </g>

  <line x1="80" y1="120" x2="1120" y2="120" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="80" y1="320" x2="1120" y2="320" stroke="url(#lineGrad)" stroke-width="1"/>

  <text x="80" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Agent Evolution
  </text>

  <text x="80" y="230" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="500">
    <tspan fill="#ff7043">智驾时代</tspan>
    <tspan fill="#ffffff"> · Agent进化简史</tspan>
  </text>

  <line x1="80" y1="260" x2="200" y2="260" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <text x="80" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#b39ddb" letter-spacing="0.5">
    从Prompt到自进化的AI驾驶之路
  </text>

  <text x="80" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#7e57c2">
    Prompt Engineering to Loop Self-Evolution — A Complete Journey
  </text>

  <text x="1120" y="360" font-family="monospace" font-size="13" fill="#5e35b1" text-anchor="end">
    Madapexai/agent-evolution-book
  </text>
</svg>
