<rect width="940" height="560" rx="22" fill="url(#bg)"/>
<text x="60" y="56" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">多智能体编排架构：协调者 + 共享总线 + Worker 池</text><rect x="320" y="90" width="300" height="84" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><text x="470.0" y="128.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Orchestrator 协调者</text><text x="470.0" y="148.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">分配 · 汇总 · 纠偏</text><line x1="470" y1="174" x2="470" y2="202" stroke="url(#acc)" stroke-width="2.5" marker-end="url(#ar)" opacity="0.9"/><rect x="210" y="204" width="520" height="60" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><text x="470.0" y="234.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">共享消息总线 / 全局记忆 Shared Bus</text><line x1="470" y1="264" x2="170" y2="322" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="70" y="324" width="200" height="96" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><text x="170.0" y="372.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Planner 规划</text><path d="M 170 420 C 170 470, 470 484, 470 268" fill="none" stroke="#7e57c2" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arW)" opacity="0.5"/><line x1="470" y1="264" x2="390" y2="322" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="290" y="324" width="200" height="96" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><text x="390.0" y="372.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Coder 编码</text><path d="M 390 420 C 390 470, 470 484, 470 268" fill="none" stroke="#7e57c2" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arW)" opacity="0.5"/><line x1="470" y1="264" x2="610" y2="322" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="510" y="324" width="200" height="96" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><text x="610.0" y="372.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Tester 测试</text><path d="M 610 420 C 610 470, 470 484, 470 268" fill="none" stroke="#7e57c2" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arW)" opacity="0.5"/><line x1="470" y1="264" x2="830" y2="322" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="730" y="324" width="200" height="96" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><text x="830.0" y="372.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Reviewer 审查</text><path d="M 830 420 C 830 470, 470 484, 470 268" fill="none" stroke="#7e57c2" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#arW)" opacity="0.5"/><text x="60" y="510" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="start" opacity="1" letter-spacing="0">协调者把任务拆给各 Worker，Worker 经共享总线交换中间结果，最终由协调者汇总。自组织即在此涌现。</text>
