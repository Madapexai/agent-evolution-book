<rect width="940" height="520" rx="22" fill="url(#bg)"/>
<text x="60" y="56" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">工具调用架构：LLM 经 Router / MCP 路由调用工具</text><rect x="60" y="200" width="180" height="96" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><text x="150.0" y="244.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">LLM 大脑</text><text x="150.0" y="264.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">决定调用哪个工具</text><line x1="240" y1="248" x2="298" y2="248" stroke="url(#acc)" stroke-width="2.5" marker-end="url(#ar)" opacity="0.9"/><rect x="300" y="200" width="200" height="96" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><text x="400.0" y="244.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Tool Router</text><text x="400.0" y="264.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">MCP 协议 · 注册 / 路由</text><line x1="500" y1="248" x2="598" y2="115" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="600" y="80" width="280" height="70" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><text x="740.0" y="115.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Search 搜索</text><line x1="500" y1="248" x2="598" y2="235" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="600" y="200" width="280" height="70" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><text x="740.0" y="235.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Code Exec 代码执行</text><line x1="500" y1="248" x2="598" y2="355" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="600" y="320" width="280" height="70" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><text x="740.0" y="355.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">DB Query 数据库</text><line x1="500" y1="248" x2="598" y2="475" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="600" y="440" width="280" height="70" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><text x="740.0" y="475.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">API Call 接口</text><path d="M 600 390 C 470 430, 320 420, 250 320" fill="none" stroke="#7e57c2" stroke-width="1.8" stroke-dasharray="7 5" marker-end="url(#arW)" opacity="0.6"/><text x="360" y="452" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#7e57c2" text-anchor="middle" opacity="1" letter-spacing="0">结果回传 LLM</text><text x="60" y="480" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="start" opacity="1" letter-spacing="0">LLM 决定动作 → Router 按 MCP 协议选定并调用工具 → 执行结果经 Router 回传 LLM，进入下一轮推理。</text>
