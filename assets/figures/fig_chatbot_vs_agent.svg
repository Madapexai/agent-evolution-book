<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 480" width="980" height="480">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="50%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <linearGradient id="accV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffa726;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ffa726;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffa726"/></marker>
    <marker id="arO" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff7043"/></marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#66bb6a"/></marker>
    <marker id="arW" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffffff"/></marker>
  </defs>
<rect width="980" height="480" rx="22" fill="url(#bg)"/>
<text x="60" y="54" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">Chatbot 与 Agent：差的不只是“会不会做”</text><rect x="60" y="110" width="400" height="300" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><rect x="60" y="110" width="400" height="5" rx="2.5" fill="#ff7043"/><text x="260.0" y="140" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Chatbot · 聊天机器人</text><text x="260.0" y="166" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">你问一句，它答一句</text><text x="260.0" y="183" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">不会真的去做</text><text x="110" y="210" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ff7043" text-anchor="middle" opacity="1" letter-spacing="0">问 → 答 → 停</text><text x="110" y="250" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">（没有手，没有脚）</text><circle cx="320" cy="320" r="26" fill="none" stroke="#ff7043" stroke-width="3" opacity="0.7"/><text x="320" y="326" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#ff7043" text-anchor="middle" opacity="1" letter-spacing="0">原地</text><rect x="520" y="110" width="400" height="300" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><rect x="520" y="110" width="400" height="5" rx="2.5" fill="#66bb6a"/><text x="720.0" y="140" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Agent · 智能体</text><text x="720.0" y="166" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">问 → 想 → 做 → 看</text><text x="720.0" y="183" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">闭环驱动、真去执行</text><circle cx="720" cy="260" r="70" fill="none" stroke="url(#acc)" stroke-width="3" opacity="0.85"/><text x="720" y="230" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffa726" text-anchor="middle" opacity="1" letter-spacing="0">想</text><text x="770" y="260" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ff7043" text-anchor="middle" opacity="1" letter-spacing="0">做</text><text x="720" y="294" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#66bb6a" text-anchor="middle" opacity="1" letter-spacing="0">看</text><text x="670" y="260" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">问</text><g transform="translate(720,370) scale(0.4)"><ellipse cx="0" cy="44" rx="108" ry="14" fill="#000000" opacity="0.28"/><rect x="-102" y="-14" width="204" height="44" rx="16" fill="#66bb6a"/><path d="M -60 -14 L -42 -54 Q -36 -60 -28 -60 L 32 -60 Q 42 -60 50 -50 L 70 -14 Z" fill="#66bb6a" opacity="0.95"/><path d="M -50 -18 L -36 -52 L 26 -52 L 42 -18 Z" fill="#1a0a2e" opacity="0.7"/><circle cx="-58" cy="30" r="21" fill="#15101f" stroke="#66bb6a" stroke-width="4"/><circle cx="58" cy="30" r="21" fill="#15101f" stroke="#66bb6a" stroke-width="4"/><circle cx="-58" cy="30" r="7" fill="#66bb6a"/><circle cx="58" cy="30" r="7" fill="#66bb6a"/><circle cx="94" cy="3" r="6" fill="#fff3e0"/></g><line x1="470" y1="260" x2="512" y2="260" stroke="arG" stroke-width="3" marker-end="url(#arG)" opacity="0.9"/><text x="490" y="245" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">本质差别</text>
<rect x="6" y="6" width="968" height="468" rx="18" fill="none" stroke="#7e57c2" stroke-width="1" opacity="0.5"/>
<text x="964" y="466" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="400" fill="#7e57c2" text-anchor="end" opacity="0.8" letter-spacing="0">智驾时代 · Agent 进化简史</text>
</svg>