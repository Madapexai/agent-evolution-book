<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 540" width="780" height="540">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
      <stop offset="100%" style="stop-color:#1a0a2e"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="50%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <linearGradient id="accV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff7043"/>
      <stop offset="100%" style="stop-color:#66bb6a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffa726;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#ffa726;stop-opacity:0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
    <marker id="ar" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffa726"/></marker>
    <marker id="arO" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff7043"/></marker>
    <marker id="arG" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#66bb6a"/></marker>
    <marker id="arW" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffffff"/></marker>
  </defs>
<rect width="780" height="540" rx="22" fill="url(#bg)"/>
<text x="60" y="56" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">Context Engineering：给 AI 装一块“聪明的挡风玻璃”</text><path d="M 140 140 L 360 140 L 300 300 L 200 300 Z" fill="rgba(255,167,38,0.12)" stroke="#ffa726" stroke-width="2"/><text x="250" y="175" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">原始信息 Raw</text><text x="250" y="200" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">海量上下文涌入</text><rect x="430" y="160" width="300" height="130" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><rect x="430" y="160" width="300" height="5" rx="2.5" fill="#ff7043"/><text x="580.0" y="190" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">前挡风玻璃：筛选 / 遮挡</text><text x="580.0" y="213" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">该透明的透明（任务相关）</text><text x="580.0" y="230" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">该遮挡的遮挡（噪音 / 越权）</text><text x="580.0" y="247" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">压缩后只留最该看的</text><line x1="360" y1="220" x2="428" y2="225" stroke="arO" stroke-width="2.5" marker-end="url(#arO)" opacity="0.9"/><text x="250" y="340" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#7e57c2" text-anchor="middle" opacity="1" letter-spacing="0">↳ 被挡掉的噪音 / 越权内容</text><rect x="140" y="360" width="250" height="110" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><rect x="140" y="360" width="250" height="5" rx="2.5" fill="#66bb6a"/><text x="265.0" y="390" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">压缩后的上下文</text><text x="265.0" y="413" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">精炼、有序、按时序</text><text x="265.0" y="430" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">送入模型窗口</text><line x1="300" y1="290" x2="265" y2="358" stroke="arG" stroke-width="2.5" marker-end="url(#arG)" opacity="0.9"/><rect x="470" y="380" width="250" height="110" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><rect x="470" y="380" width="250" height="5" rx="2.5" fill="#ff7043"/><text x="595.0" y="410" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">LLM 窗口</text><text x="595.0" y="434" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">只看到“该看的”</text><text x="595.0" y="451" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">推理更准、成本更低</text><line x1="390" y1="415" x2="468" y2="415" stroke="arO" stroke-width="2.5" marker-end="url(#arO)" opacity="0.9"/>
<rect x="6" y="6" width="768" height="528" rx="18" fill="none" stroke="#7e57c2" stroke-width="1" opacity="0.5"/>
<text x="764" y="526" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="400" fill="#7e57c2" text-anchor="end" opacity="0.8" letter-spacing="0">智驾时代 · Agent 进化简史</text>
</svg>