<rect width="920" height="520" rx="22" fill="url(#bg)"/>
<text x="60" y="64" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="30" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">Agent = 一辆会自己开的智能车</text><text x="60" y="96" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#b39ddb" text-anchor="start" opacity="1" letter-spacing="0">LLM 是大脑，Harness 是整车安全系统——合起来，才是一辆能上路的车。</text><rect x="0" y="430" width="920" height="90" fill="#15101f" opacity="0.6"/><line x1="0" y1="462" x2="920" y2="462" stroke="#ffa726" stroke-width="3" stroke-dasharray="22 18" opacity="0.7"/><circle cx="460" cy="290" r="150" fill="#ffa726" opacity="0.22" filter="url(#blur)"/><g transform="translate(460,330) scale(1.25)"><ellipse cx="0" cy="44" rx="108" ry="14" fill="#000000" opacity="0.28"/><rect x="-102" y="-14" width="204" height="44" rx="16" fill="#ffa726"/><path d="M -60 -14 L -42 -54 Q -36 -60 -28 -60 L 32 -60 Q 42 -60 50 -50 L 70 -14 Z" fill="#ffa726" opacity="0.95"/><path d="M -50 -18 L -36 -52 L 26 -52 L 42 -18 Z" fill="#1a0a2e" opacity="0.7"/><circle cx="-58" cy="30" r="21" fill="#15101f" stroke="#ffa726" stroke-width="4"/><circle cx="58" cy="30" r="21" fill="#15101f" stroke="#ffa726" stroke-width="4"/><circle cx="-58" cy="30" r="7" fill="#ffa726"/><circle cx="58" cy="30" r="7" fill="#ffa726"/><circle cx="94" cy="3" r="6" fill="#fff3e0"/></g><rect x="360" y="150" width="200" height="86" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><rect x="360" y="150" width="200" height="5" rx="2.5" fill="#ff7043"/><text x="460.0" y="180" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">LLM · 大脑</text><text x="460.0" y="205" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">理解 / 推理 / 生成</text><text x="460.0" y="222" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">罐子里的大脑</text><line x1="460" y1="236" x2="460" y2="268" stroke="arO" stroke-width="3" marker-end="url(#arO)" opacity="0.9"/><rect x="640" y="300" width="230" height="92" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><rect x="640" y="300" width="230" height="5" rx="2.5" fill="#66bb6a"/><text x="755.0" y="330" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Harness · 整车安全系统</text><text x="755.0" y="354" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">记忆 · 工具 · 上下文</text><text x="755.0" y="371" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">权限 · 验证 · 治理</text><line x1="636" y1="330" x2="690" y2="333" stroke="arG" stroke-width="2.5" marker-end="url(#arG)" opacity="0.9"/><rect x="80" y="408" width="64" height="26" rx="6" fill="#15101f" stroke="#ff7043" stroke-width="1.5" opacity="0.9"/><text x="112" y="425" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#ff7043" text-anchor="middle" opacity="1" letter-spacing="0">Prompt</text><rect x="164" y="408" width="64" height="26" rx="6" fill="#15101f" stroke="#ffa726" stroke-width="1.5" opacity="0.9"/><text x="196" y="425" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#ffa726" text-anchor="middle" opacity="1" letter-spacing="0">Context</text><rect x="248" y="408" width="64" height="26" rx="6" fill="#15101f" stroke="#ffa726" stroke-width="1.5" opacity="0.9"/><text x="280" y="425" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#ffa726" text-anchor="middle" opacity="1" letter-spacing="0">Harness</text><rect x="332" y="408" width="64" height="26" rx="6" fill="#15101f" stroke="#66bb6a" stroke-width="1.5" opacity="0.9"/><text x="364" y="425" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#66bb6a" text-anchor="middle" opacity="1" letter-spacing="0">Loop</text><rect x="416" y="408" width="64" height="26" rx="6" fill="#15101f" stroke="#66bb6a" stroke-width="1.5" opacity="0.9"/><text x="448" y="425" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#66bb6a" text-anchor="middle" opacity="1" letter-spacing="0">Auto-Org</text><text x="60" y="408" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#b39ddb" text-anchor="start" opacity="1" letter-spacing="0">演化来路 →</text>
