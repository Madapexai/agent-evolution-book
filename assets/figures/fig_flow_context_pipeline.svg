<rect width="860" height="580" rx="22" fill="url(#bg)"/>
<text x="60" y="52" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">上下文工程流水线：给 LLM 喂对的料</text><rect x="270" y="70" width="220" height="50" rx="25.0" fill="#ff7043" opacity="0.18" stroke="#ff7043" stroke-width="2"/><text x="380.0" y="100.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">原始信号</text><text x="380" y="100" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">（对话 / 文件 / 工具结果）</text><line x1="380" y1="120" x2="380" y2="146" stroke="url(#acc)" stroke-width="2.5" marker-end="url(#ar)" opacity="0.9"/><rect x="270" y="146" width="220" height="50" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><text x="380.0" y="171.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">① 采集 Collect</text><line x1="380" y1="196" x2="380" y2="222" stroke="url(#acc)" stroke-width="2.5" marker-end="url(#ar)" opacity="0.9"/><rect x="270" y="222" width="220" height="50" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><text x="380.0" y="243.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">② 筛选 Filter</text><text x="380.0" y="263.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">去噪 