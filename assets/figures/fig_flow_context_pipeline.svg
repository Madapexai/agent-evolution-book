<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" width="860" height="580">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#2d1b4e"/>
