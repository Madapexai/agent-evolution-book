="0">送入 LLM 窗口</text><line x1="380" y1="424" x2="380" y2="450" stroke="url(#acc)" stroke-width="2.5" marker-end="url(#ar)" opacity="0.9"/><rect x="270" y="450" width="220" height="50" rx="12" ry="12" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><text x="380.0" y="471.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">⑤ 回收 Forget</text><text x="380.0" y="491.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">过期清理 · 记忆隔离</text><text x="60" y="542" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="start" opacity="1" letter-spacing="0">该透明的透明，该遮挡的遮挡——上下文工程就是给 AI 装一块“聪明的挡风玻璃”。</text>
