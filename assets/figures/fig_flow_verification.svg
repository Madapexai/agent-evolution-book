<rect width="860" height="660" rx="22" fill="url(#bg)"/>
<text x="60" y="52" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">验证流水线：一道道关，过不了就打回</text><rect x="260" y="70" width="200" height="50" rx="25.0" fill="#ff7043" opacity="0.18" stroke="#ff7043" stroke-width="2"/><text x="360.0" y="100.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Agent 产出</text><line x1="360" y1="120" x2="360" y2="124" stroke="url(#acc)" stroke-width="2.2" marker-end="url(#ar)" opacity="0.9"/><polygon points="360,124 406,170 360,216 314,170" fill="rgba(255,255,255,0.07)" stroke="#ff7043" stroke-width="2.2"/><text x="360" y="175" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">通过?</text><path d="M 314 170 C 150 170, 150 250, 260 95" fill="none" stroke="#ff7043" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arO)" opacity="0.55"/><text x="120" y="170" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#ff7043" text-anchor="middle" opacity="1" letter-spacing="0">否→打回</text><line x1="360" y1="216" x2="360" y2="224" stroke="url(#acc)" stroke-width="2.2" marker-end="url(#ar)" opacity="0.9"/><polygon points="360,224 406,270 360,316 314,270" fill="rgba(255,255,255,0.07)" stroke="#ffa726" stroke-width="2.2"/><text x="360" y="275" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">通过?</text><path d="M 314 270 C 150 270, 150 250, 260 95" fill="none" stroke="#ffa726" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arO)" opacity="0.55"/><text x="120" y="270" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#ffa726" text-anchor="middle" opacity="1" letter-spacing="0">否→打回</text><line x1="360" y1="316" x2="360" y2="324" stroke="url(#acc)" stroke-width="2.2" marker-end="url(#ar)" opacity="0.9"/><polygon points="360,324 406,370 360,416 314,370" fill="rgba(255,255,255,0.07)" stroke="#66bb6a" stroke-width="2.2"/><text x="360" y="375" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">通过?</text><path d="M 314 370 C 150 370, 150 250, 260 95" fill="none" stroke="#66bb6a" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arO)" opacity="0.55"/><text x="120" y="370" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#66bb6a" text-anchor="middle" opacity="1" letter-spacing="0">否→打回</text><line x1="360" y1="416" x2="360" y2="424" stroke="url(#acc)" stroke-width="2.2" marker-end="url(#ar)" opacity="0.9"/><polygon points="360,424 406,470 360,516 314,470" fill="rgba(255,255,255,0.07)" stroke="#ff7043" stroke-width="2.2"/><text x="360" y="475" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">通过?</text><path d="M 314 470 C 150 470, 150 250, 260 95" fill="none" stroke="#ff7043" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arO)" opacity="0.55"/><text x="120" y="470" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" font-weight="600" fill="#ff7043" text-anchor="middle" opacity="1" letter-spacing="0">否→打回</text><line x1="360" y1="516" x2="360" y2="560" stroke="url(#acc)" stroke-width="2.5" marker-end="url(#ar)" opacity="0.9"/><rect x="260" y="560" width="200" height="50" rx="25.0" fill="#66bb6a" opacity="0.18" stroke="#66bb6a" stroke-width="2"/><text x="360.0" y="590.0" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">合并 / 上线</text><text x="60" y="630" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="start" opacity="1" letter-spacing="0">每一道关卡都过不了就打回重做——验证（Verification）是 Harness 质量的最后一道闸。</text>
