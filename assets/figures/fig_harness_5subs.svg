url(#ar)" opacity="0.9"/><rect x="640" y="230" width="290" height="86" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><rect x="640" y="230" width="290" height="5" rx="2.5" fill="#ffa726"/><text x="785.0" y="260" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Memory · RAG</text><text x="785.0" y="284" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">记住什么</text><text x="785.0" y="301" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">导航+行车记录仪：该存多久、怎么隔离</text><line x1="632" y1="273" x2="470" y2="340" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="640" y="350" width="290" height="86" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><rect x="640" y="350" width="290" height="5" rx="2.5" fill="#66bb6a"/><text x="785.0" y="380" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Tool</text><text x="785.0" y="404" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">能做什么</text><text x="785.0" y="421" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">机械手+工具箱：真正去拧螺丝</text><line x1="632" y1="393" x2="470" y2="340" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="640" y="470" width="290" height="86" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><rect x="640" y="470" width="290" height="5" rx="2.5" fill="#ff7043"/><text x="785.0" y="500" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Policy</text><text x="785.0" y="524" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">不能做什么</text><text x="785.0" y="541" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">刹车+交通规则：红线绝不越</text><line x1="632" y1="513" x2="470" y2="340" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="640" y="560" width="290" height="86" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><rect x="640" y="560" width="290" height="5" rx="2.5" fill="#66bb6a"/><text x="785.0" y="590" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Verification</text><text x="785.0" y="614" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">做对了吗</text><text x="785.0" y="631" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12.5" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">后视镜+年检：结果复核再交付</text><line x1="632" y1="603" x2="470" y2="340" stroke="url(#acc)" stroke-width="2" marker-end="url(#ar)" opacity="0.9"/><rect x="60" y="230" width="230" height="90" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><rect x="60" y="230" width="230" height="5" rx="2.5" fill="#ff7043"/><text x="175.0" y="260" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">Agent = LLM + Harness</text><text x="175.0" y="283" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">一整套工程系统</text><text x="175.0" y="300" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">而非单一技术</text>
