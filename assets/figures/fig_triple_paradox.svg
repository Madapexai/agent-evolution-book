<rect width="980" height="470" rx="22" fill="url(#bg)"/>
<text x="60" y="56" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="23" font-weight="800" fill="#ffffff" text-anchor="start" opacity="0" letter-spacing="-0.5">三重悖论：Agent 越强，越要回答这三个“反过来”的问题</text><rect x="60.0" y="110" width="290" height="300" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ff7043" stroke-width="1.6" opacity="1"/><rect x="60.0" y="110" width="290" height="5" rx="2.5" fill="#ff7043"/><text x="205.0" y="140" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">记忆悖论</text><text x="205.0" y="168" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">Memory Paradox</text><text x="205.0" y="185" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">记得越多 ≠ 越聪明</text><text x="205.0" y="202" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">记忆要管理：存多久、</text><text x="205.0" y="219" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">怎么隔离、何时丢弃</text><circle cx="205.0" cy="260" r="34" fill="none" stroke="#ff7043" stroke-width="3" opacity="0.8"/><path d="M 181.0 236 A 34 34 0 0 1 229.0 236" fill="none" stroke="#ff7043" stroke-width="3" marker-end="url(#ar)" opacity="0.9"/><path d="M 229.0 284 A 34 34 0 0 1 181.0 284" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arW)" opacity="0.7"/><text x="205.0" y="266" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">⇄</text><rect x="345.0" y="110" width="290" height="300" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.6" opacity="1"/><rect x="345.0" y="110" width="290" height="5" rx="2.5" fill="#ffa726"/><text x="490.0" y="140" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">推理悖论</text><text x="490.0" y="168" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">Reasoning Paradox</text><text x="490.0" y="185" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">想得越细 ≠ 越对</text><text x="490.0" y="202" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">分步思考提升准确率，</text><text x="490.0" y="219" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">但也会走入过度推理</text><circle cx="490.0" cy="260" r="34" fill="none" stroke="#ffa726" stroke-width="3" opacity="0.8"/><path d="M 466.0 236 A 34 34 0 0 1 514.0 236" fill="none" stroke="#ffa726" stroke-width="3" marker-end="url(#ar)" opacity="0.9"/><path d="M 514.0 284 A 34 34 0 0 1 466.0 284" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arW)" opacity="0.7"/><text x="490.0" y="266" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">⇄</text><rect x="630.0" y="110" width="290" height="300" rx="14" ry="14" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.6" opacity="1"/><rect x="630.0" y="110" width="290" height="5" rx="2.5" fill="#66bb6a"/><text x="775.0" y="140" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">进化悖论</text><text x="775.0" y="168" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">Evolution Paradox</text><text x="775.0" y="185" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">改自己 ≠ 更可靠</text><text x="775.0" y="202" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">自进化带来能力跃迁，</text><text x="775.0" y="219" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">也带来失控风险</text><circle cx="775.0" cy="260" r="34" fill="none" stroke="#66bb6a" stroke-width="3" opacity="0.8"/><path d="M 751.0 236 A 34 34 0 0 1 799.0 236" fill="none" stroke="#66bb6a" stroke-width="3" marker-end="url(#ar)" opacity="0.9"/><path d="M 799.0 284 A 34 34 0 0 1 751.0 284" fill="none" stroke="#ffffff" stroke-width="2.5" marker-end="url(#arW)" opacity="0.7"/><text x="775.0" y="266" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing