ba(255,255,255,0.05)" stroke="#ffa726" stroke-width="1.5" opacity="#ffa726"/><text x="540.0" y="550" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="800" fill="#ffa726" text-anchor="middle" opacity="0.45" letter-spacing="0">02</text><g transform="translate(540.0,680)" opacity="0.9"><path d="M -34 0 A 34 34 0 1 1 -24 -24" fill="none" stroke="#ffa726" stroke-width="5" stroke-linecap="round"/><path d="M -24 -24 l 14 2 l -6 14 z" fill="#ffa726"/><circle cx="0" cy="0" r="9" fill="#ffa726" opacity="0.5"/></g><text x="540.0" y="790" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">推理悖论</text><text x="540.0" y="842" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">想得越深，越可能绕回原地</text><rect x="711.0" y="470" width="290" height="540" rx="18" ry="18" fill="rgba(255,255,255,0.05)" stroke="#66bb6a" stroke-width="1.5" opacity="#66bb6a"/><text x="856.0" y="550" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="800" fill="#66bb6a" text-anchor="middle" opacity="0.45" letter-spacing="0">03</text><g transform="translate(856.0,680)" opacity="0.9"><path d="M -34 0 A 34 34 0 1 1 -24 -24" fill="none" stroke="#66bb6a" stroke-width="5" stroke-linecap="round"/><path d="M -24 -24 l 14 2 l -6 14 z" fill="#66bb6a"/><circle cx="0" cy="0" r="9" fill="#66bb6a" opacity="0.5"/></g><text x="856.0" y="790" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle" opacity="1" letter-spacing="0">进化悖论</text><text x="856.0" y="842" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="400" fill="#b39ddb" text-anchor="middle" opacity="1" letter-spacing="0">越能自组织，越难被理解</text><text x="540.0" y="1080" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#ffa726" text-anchor="middle" opacity="1" letter-spacing="0">三个悖论，书中都给了可落地的破局思路</text><line x1="72" y1="1362" x2="1008" y2="1362" stroke="#7e57c2" stroke-width="1" opacity="0.4"/><text x="72" y="1388" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#ffffff" text-anchor="start" opacity="1" letter-spacing="0">智驾时代 · Agent 进化简史</text><text x="1008" y="1388" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19" font-weight="700" fill="#ffa726" text-anchor="end" opacity="1" letter-spacing="0">GitHub 免费开读 ↗</text><text x="72" y="1418" font-family="Inter, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#7e57c2" text-anchor="start" opacity="0.9" letter-spacing="0">github.com/Madapexai/agent-evolution-book</text>
