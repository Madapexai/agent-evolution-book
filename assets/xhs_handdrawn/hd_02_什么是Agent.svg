ont-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">可观测与可审计</text><text x="1016" y="1390" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#555555" text-anchor="end" opacity="0.7">《智驾时代：Agent 进化简史》</text>
