<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
<rect width="1080" height="1440" fill="#fffef8"/><text x="64" y="90" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="800" fill="#4a90e2" text-anchor="start" opacity="1.0">01  </text><text x="154" y="90" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="800" fill="#2d2d2d" text-anchor="start" opacity="1.0">什么是 Agent</text><rect x="64" y="104" width="888" height="7" rx="3" fill="#7eb3f0"/><rect x="64" y="150" width="952" height="160" rx="18" ry="18" fill="#f0f6ff" stroke="#4a90e2" stroke-width=2.0" stroke-linejoin="round"/><text x="94" y="205" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">Agent 就是一辆会自己开的「智能车」——它不只是陪你聊天，</text><text x="94" y="250" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">而是真正替你做事：读文件、写代码、跑测试、发邮件……</text><rect x="64" y="360" width="458" height="340" rx="16" ry="16" fill="#c5493d" stroke="#e86c60" stroke-width=2.0" stroke-linejoin="round"/><text x="302" y="410" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800" fill="#e86c60" text-anchor="middle" opacity="1.0">Chatbot 聊天机器人</text><text x="322" y="460" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">X  只会说不会做</text><text x="322" y="498" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">X  你问一句它答一句</text><text x="322" y="536" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">X  方向盘在你手里</text><rect x="558" y="360" width="458" height="340" rx="16" ry="16" fill="#2d9559" stroke="#50b87c" stroke-width=2.0" stroke-linejoin="round"/><text x="778" y="410" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="30" font-weight="800" fill="#50b87c" text-anchor="middle" opacity="1.0">Agent 智能体</text><text x="798" y="460" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  能说又能干</text><text x="798" y="498" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  自己规划并执行</text><text x="798" y="536" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  方向盘交出去了</text><text x="540" y="530" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="36" font-weight="900" fill="#f5a623" text-anchor="middle" opacity="1.0">VS</text><rect x="104" y="750" width="872" height="140" rx="18" ry="18" fill="#fff8e6" stroke="#f5a623" stroke-width=2.0" stroke-linejoin="round"/><text x="540" y="808" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="600" fill="#2d2d2d" text-anchor="middle" opacity="1.0">ChatGPT 是副驾陪聊的朋友，Agent 是替你开车的司机</text><rect x="84" y="930" width="310" height="180" rx="16" ry="16" fill="#ffffff" stroke="#8b6ec9" stroke-width=2.0" stroke-linejoin="round"/><rect x="84" y="930" width="310" height="8" rx="4" fill="#8b6ec9"/><g transform="translate(209,966)"><g transform="translate(0,0) scale(0.900000)"><path d="M25 5 Q35 0 45 5 Q55 0 65 5 Q72 15 68 28 Q75 40 65 50 Q70 60 60 65 Q50 75 40 70 Q30 75 20 65 Q10 60 15 50 Q5 40 12 28 Q8 15 25 5Z" fill="#e88fb0" stroke="#555555" stroke-width="2"/><path d="M30 20 Q40 15 50 20 M28 32 Q40 27 52 32 M30 44 Q40 39 50 44" fill="none" stroke="#555555" stroke-width="1.5"/></g></g><text x="239" y="1040" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#2d2d2d" text-anchor="middle" opacity="1.0">大脑</text><text x="239" y="1070" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">LLM 做所有决策</text><rect x="418" y="930" width="310" height="180" rx="16" ry="16" fill="#ffffff" stroke="#4a90e2" stroke-width=2.0" stroke-linejoin="round"/><rect x="418" y="930" width="310" height="8" rx="4" fill="#4a90e2"/><g transform="translate(543,966)"><g transform="translate(0,0) scale(0.900000)"><path d="M0 8 Q20 0 40 8 L40 56 Q20 48 0 56Z" fill="#7eb3f0" stroke="#555555" stroke-width="2"/><path d="M40 8 Q60 0 80 8 L80 56 Q60 48 40 56Z" fill="#4a90e2" stroke="#555555" stroke-width="2"/><line x1="40" y1="8" x2="40" y2="56" stroke="#555555" stroke-width="2"/><line x1="8" y1="20" x2="32" y2="20" stroke="#555555" stroke-width="1.5" opacity="0.4"/><line x1="48" y1="20" x2="72" y2="20" stroke="#555555" stroke-width="1.5" opacity="0.4"/><line x1="8" y1="30" x2="32" y2="30" stroke="#555555" stroke-width="1.5" opacity="0.4"/><line x1="48" y1="30" x2="72" y2="30" stroke="#555555" stroke-width="1.5" opacity="0.4"/><line x1="8" y1="40" x2="32" y2="40" stroke="#555555" stroke-width="1.5" opacity="0.4"/><line x1="48" y1="40" x2="72" y2="40" stroke="#555555" stroke-width="1.5" opacity="0.4"/></g></g><text x="573" y="1040" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#2d2d2d" text-anchor="middle" opacity="1.0">视野</text><text x="573" y="1070" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">上下文决定能看到什么</text><rect x="752" y="930" width="310" height="180" rx="16" ry="16" fill="#ffffff" stroke="#f5a623" stroke-width=2.0" stroke-linejoin="round"/><rect x="752" y="930" width="310" height="8" rx="4" fill="#f5a623"/><g transform="translate(877,966)"><g transform="translate(0,0) scale(0.900000)"><path d="M8 52 L36 24 A16 16 0 1 1 52 8 L24 36 L8 52Z" fill="#f5a623" stroke="#555555" stroke-width="2"/><circle cx="46" cy="14" r="8" fill="none" stroke="#555555" stroke-width="2"/></g></g><text x="907" y="1040" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#2d2d2d" text-anchor="middle" opacity="1.0">工具</text><text x="907" y="1070" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">手脚与真实世界交互</text><rect x="84" y="1134" width="310" height="180" rx="16" ry="16" fill="#ffffff" stroke="#e86c60" stroke-width=2.0" stroke-linejoin="round"/><rect x="84" y="1134" width="310" height="8" rx="4" fill="#e86c60"/><g transform="translate(209,1170)"><g transform="translate(0,0) scale(0.900000)"><rect x="4" y="20" width="40" height="32" rx="6" fill="#e86c60" stroke="#555555" stroke-width="2"/><path d="M14 20 L14 12 Q14 0 24 0 Q34 0 34 12 L34 20" fill="none" stroke="#555555" stroke-width="3"/><circle cx="24" cy="36" r="5" fill="#2d2d2d"/><line x1="24" y1="36" x2="24" y2="42" stroke="#2d2d2d" stroke-width="2.5"/></g></g><text x="239" y="1244" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="700" fill="#2d2d2d" text-anchor="middle" opacity="1.0">安全</text><text x="239" y="1274" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="15" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">Harness 刹车与交规</text><rect x="418" y="1134" width="310" height="180" rx="16" ry="16" fill="#ffffff" stroke="#50b87c" stroke-width=2.0" stroke-linejoin="round"/><rect x="418" y="1134" width="310" height="8" rx="4" fill="#50b87c"/><g transform="translate(543,1170)"><g transform