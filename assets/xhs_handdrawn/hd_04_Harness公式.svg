<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
<rect width="1080" height="1440" fill="#fffef8"/><text x="64" y="80" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="800" fill="#e86c60" text-anchor="start" opacity="1.0">03  </text><text x="154" y="80" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="800" fill="#2d2d2d" text-anchor="start" opacity="1.0">Agent 的核心公式</text><rect x="64" y="94" width="888" height="7" rx="3" fill="#f7d154"/><rect x="104" y="170" width="872" height="180" rx="24" ry="24" fill="#fff5f0" stroke="#e86c60" stroke-width=3.0" stroke-linejoin="round"/><text x="540" y="245" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="52" font-weight="800" fill="#2d2d2d" text-anchor="middle" opacity="1.0">Agent</text><text x="540" y="300" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="32" font-weight="600" fill="#2d2d2d" text-anchor="middle" opacity="1.0">=   LLM（聪明的大脑）  +  Harness（安全系统）</text><text x="94" y="390" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="26" font-weight="600" fill="#e86c60" text-anchor="start" opacity="1.0">没有 Harness 的 Agent，就像没有刹车的跑车——</text><text x="94" y="434" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#2d2d2d" text-anchor="start" opacity="1.0">跑得越快，死得越惨</text><rect x="47" y="500" width="310" height="220" rx="18" ry="18" fill="#ffffff" stroke="#e86c60" stroke-width=2.5" stroke-linejoin="round"/><rect x="47" y="500" width="310" height="10" rx="5" fill="#e86c60"/><text x="202" y="550" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#e86c60" text-anchor="middle" opacity="1.0">红灯 · 绝对禁止</text><text x="202" y="590" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">删数据库、改生产配置</text><text x="202" y="622" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">系统直接拦截，碰都不能碰</text><rect x="385" y="500" width="310" height="220" rx="18" ry="18" fill="#ffffff" stroke="#f5a623" stroke-width=2.5" stroke-linejoin="round"/><rect x="385" y="500" width="310" height="10" rx="5" fill="#f5a623"/><text x="540" y="550" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#f5a623" text-anchor="middle" opacity="1.0">黄灯 · 需要确认</text><text x="540" y="590" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">删文件、改配置、部署上线</text><text x="540" y="622" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">AI 说清楚原因，人点头才能干</text><rect x="723" y="500" width="310" height="220" rx="18" ry="18" fill="#ffffff" stroke="#50b87c" stroke-width=2.5" stroke-linejoin="round"/><rect x="723" y="500" width="310" height="10" rx="5" fill="#50b87c"/><text x="878" y="550" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#50b87c" text-anchor="middle" opacity="1.0">绿灯 · 自动执行</text><text x="878" y="590" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">读文件、跑测试、写代码</text><text x="878" y="622" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">只读操作或容易回滚，放手去做</text><text x="64" y="780" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#2d2d2d" text-anchor="start" opacity="1.0">Harness 五大子系统（从输入到输出的完整闭环）：</text><circle cx="84" cy="846" r="18" fill="#4a90e2"/><text x="84" y="853" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">1</text><text x="116" y="838" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#4a90e2" text-anchor="start" opacity="1.0">Context</text><text x="116" y="866" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">-&gt; 看到什么  (前挡风玻璃)</text><circle cx="424" cy="846" r="18" fill="#8b6ec9"/><text x="424" y="853" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">2</text><text x="456" y="838" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#8b6ec9" text-anchor="start" opacity="1.0">Memory</text><text x="456" y="866" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">-&gt; 记住什么  (导航+记录仪)</text><circle cx="764" cy="846" r="18" fill="#f5a623"/><text x="764" y="853" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">3</text><text x="796" y="838" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#f5a623" text-anchor="start" opacity="1.0">Tool</text><text x="796" y="866" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">-&gt; 能做什么  (机械手+工具箱)</text><circle cx="84" cy="946" r="18" fill="#e86c60"/><text x="84" y="953" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">4</text><text x="116" y="938" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#e86c60" text-anchor="start" opacity="1.0">Policy</text><text x="116" y="966" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">-&gt; 不能做什么  (刹车+交规)</text><circle cx="424" cy="946" r="18" fill="#50b87c"/><text x="424" y="953" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="800" fill="#ffffff" text-anchor="middle">5</text><text x="456" y="938" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#50b87c" text-anchor="start" opacity="1.0">Verification</text><text x="456" y="966" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">-&gt; 做对了没  (质检+路考)</text><text x="1016" y="1390" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#555555" text-anchor="end" opacity="0.7">《智驾时代：Agent 进化简史》</text>
</svg>