<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1440" width="1080" height="1440">
<rect width="1080" height="1440" fill="#fffef8"/><text x="64" y="80" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="800" fill="#5bc0be" text-anchor="start" opacity="1.0">05  </text><text x="154" y="80" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="64" font-weight="800" fill="#2d2d2d" text-anchor="start" opacity="1.0">AI 不能给自己打分</text><rect x="64" y="94" width="888" height="7" rx="3" fill="#5bc0be"/><rect x="64" y="150" width="952" height="100" rx="16" ry="16" fill="#fff0f0" stroke="#e86c60" stroke-width=2.0" stroke-linejoin="round"/><text x="94" y="190" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#e86c60" text-anchor="start" opacity="1.0">让 AI 检查自己的工作 = 让考生自己改卷子 -&gt; 分数只会越判越高</text><text x="94" y="228" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">因为写代码和检查用的是同一个大脑，犯的错大概率也发现不了</text><rect x="64" y="290" width="440" height="380" rx="18" ry="18" fill="#f0f8ff" stroke="#4a90e2" stroke-width=2.0" stroke-linejoin="round"/><rect x="64" y="290" width="440" height="8" rx="4" fill="#4a90e2"/><text x="284" y="340" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#4a90e2" text-anchor="middle" opacity="1.0">Builder 建造者</text><text x="284" y="380" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">目标：把事情做成</text><g transform="translate(244,410)"><g transform="scale(0.9)"><g transform="translate(0,0) scale(1.000000)"><rect x="0" y="16" width="80" height="32" rx="10" fill="#4a90e2" stroke="#555555" stroke-width="2"/><path d="M18 16 Q30 -4 54 -4 Q70 -4 76 16 Z" fill="#4a90e2" stroke="#555555" stroke-width="2"/><path d="M22 14 Q32 0 48 0 Q62 0 68 14 Z" fill="#e8f0fe" opacity="0.7"/><circle cx="22" cy="52" r="12" fill="#2d2d2d" stroke="#4a90e2" stroke-width="3"/><circle cx="58" cy="52" r="12" fill="#2d2d2d" stroke="#4a90e2" stroke-width="3"/><circle cx="22" cy="52" r="5" fill="#ddd"/><circle cx="58" cy="52" r="5" fill="#ddd"/><circle cx="78" cy="34" r="4" fill="#fff3cd"/></g></g></g><text x="94" y="510" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  建设性思维 —— 怎么实现</text><text x="94" y="546" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  关注功能、效率、进度</text><text x="94" y="582" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  可以修改文件、执行命令</text><text x="94" y="618" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#e86c60" text-anchor="start" opacity="1.0">X  容易放过自己的错误</text><rect x="576" y="290" width="440" height="380" rx="18" ry="18" fill="#f0fff4" stroke="#50b87c" stroke-width=2.0" stroke-linejoin="round"/><rect x="576" y="290" width="440" height="8" rx="4" fill="#50b87c"/><text x="796" y="340" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#50b87c" text-anchor="middle" opacity="1.0">Reviewer 审查者</text><text x="796" y="380" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="400" fill="#555555" text-anchor="middle" opacity="1.0">目标：把好质量关</text><g transform="translate(766,410)"><g transform="scale(1.0)"><g transform="translate(0,0) scale(1.000000)"><circle cx="20" cy="20" r="20" fill="#50b87c" opacity="0.15"/><circle cx="20" cy="20" r="20" fill="none" stroke="#50b87c" stroke-width="2.5"/><path d="M10 21 L17 28 L31 12" fill="none" stroke="#50b87c" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/></g></g></g><text x="606" y="510" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  批判性思维 —— 哪里有问题</text><text x="606" y="546" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  关注质量、安全、规范</text><text x="606" y="582" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#50b87c" text-anchor="start" opacity="1.0">X  只能读取，不能修改</text><text x="606" y="618" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="19" font-weight="500" fill="#2d2d2d" text-anchor="start" opacity="1.0">V  专门挑刺找漏洞</text><text x="540" y="480" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#f5a623" text-anchor="middle" opacity="1.0">! 互
搏</text><rect x="104" y="720" width="872" height="120" rx="18" ry="18" fill="#fff8e6" stroke="#f5a623" stroke-width=2.0" stroke-linejoin="round"/><text x="540" y="765" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800" fill="#f5a623" text-anchor="middle" opacity="1.0">矛盾产生真相</text><text x="540" y="805" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="20" font-weight="500" fill="#2d2d2d" text-anchor="middle" opacity="1.0">一个想快点做完，一个确保没问题 —— 互相博弈、互相校正，质量才靠谱</text><text x="64" y="880" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="600" fill="#2d2d2d" text-anchor="start" opacity="1.0">三层验证法（从基础到终极）：</text><circle cx="84" cy="942" r="20" fill="#4a90e2"/><text x="84" y="949" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">1</text><text x="120" y="936" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#4a90e2" text-anchor="start" opacity="1.0">运行检查</text><text x="120" y="964" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">能不能跑起来？</text><circle cx="84" cy="1014" r="20" fill="#8b6ec9"/><text x="84" y="1021" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">2</text><text x="120" y="1008" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#8b6ec9" text-anchor="start" opacity="1.0">独立审查</text><text x="120" y="1036" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">做得对不对？</text><circle cx="84" cy="1086" r="20" fill="#50b87c"/><text x="84" y="1093" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="middle">3</text><text x="120" y="1080" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="22" font-weight="700" fill="#50b87c" text-anchor="start" opacity="1.0">明确通过条件</text><text x="120" y="1108" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="17" font-weight="400" fill="#555555" text-anchor="start" opacity="1.0">算不算完成？</text><text x="1016" y="1390" font-family="Noto Sans CJK SC, PingFang SC, Microsoft YaHei, sans-serif" font-size="18" font-weight="400" fill="#555555" text-anchor="end" opacity="0.7">《智驾时代：Agent 进化简史》</text>
</svg>